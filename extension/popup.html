<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 220px; padding: 16px; font-family: 'DM Mono', 'Fira Code', monospace;
           background: #0d0d1a; color: #e2e8f0; text-align: center; }
    p { font-size: 10px; color: #64748b; margin: 10px 0 0; letter-spacing: 0.04em; }
    button { width: 100%; padding: 9px 12px; background: #1d4ed8; color: #fff; border: 1px solid #3b82f6;
             border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 11px;
             font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    button:hover { background: #3b82f6; }
  </style>
</head>
<body>
  <button id="btn-panel">Open Side Panel</button>
  <p>Use the side panel for the full dashboard</p>
  <script src="popup.js"></script>
</body>
</html>
